<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Learning for Kids!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/arabic-style.css">
</head>
<body>

    <header>
        <h1>🎉 Let's Learn! 🎉</h1>
    </header>

    <div class="nav-buttons">
        <button id="abc-mode-btn" class="mode-btn" onclick="switchMode('abc')">🔤 ABCs</button>
        <button id="num-mode-btn" class="mode-btn" onclick="switchMode('num')">🔢 123s</button>
        <button id="game-abc-btn" class="mode-btn" onclick="switchMode('game-abc')">Alphabet Quiz 🔤</button>
        <button id="game-num-btn" class="mode-btn" onclick="switchMode('game-num')">Number Quiz 🔢</button>
        <button id="arabic-abc-btn" class="mode-btn" onclick="switchMode('arabic-abc')">🔠 Arabic</button>
        <button id="arabic-num-btn" class="mode-btn" onclick="switchMode('arabic-num')">١٢٣ Arabic</button>
        <button id="shapes-btn" class="mode-btn" onclick="switchMode('shapes')">🎨 Shapes</button>
    </div>

    <!-- Active Detail Panel -->
    <div id="details-display" class="hidden container-fluid">
        <img id="primary-image" src="" alt="Detail view">
        <div class="example-display">
            <p id="number-word-text" class="m-0"></p>
            <img id="example-image" src="" alt="Example visualization">
            <p id="example-text" class="m-0"></p>
        </div>
    </div>

    <!-- Game Panel -->
    <div id="game-container" class="hidden container-fluid">
        <div id="score-area">
            Score: <span id="stars-display"></span>
        </div>
        <div id="feedback-text"></div>
        <h2 id="question-text"></h2>
        <div id="options-area"></div>
    </div>

    <main id="learning-main" class="container-fluid mb-4">
        <div id="abc-container"></div>
        <div id="num-container" class="hidden"></div>
        <div id="arabic-abc-container" class="hidden"></div>
        <div id="arabic-num-container" class="hidden"></div>
        <div id="shapes-container" class="hidden"></div>
    </main>

    <!-- Audio for Game -->
    <!-- IMPORTANT: You need to add a 'clap.mp3' file to your images folder -->
    <audio id="clap-sound" src="images/clap.mp3"></audio>

    <script src="scripts/main.js"></script>
    <script src="scripts/arabic-main.js"></script>
    <script src="scripts/shapes-main.js"></script>
</body>
</html>
