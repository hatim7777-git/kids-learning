<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Learning for Kids!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --primary-bg: #FFEB3B;
            --card-abc: #FF5722;
            --card-num: #4CAF50;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F0F8FF;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            background-color: #FF9800;
            padding: 15px;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.5rem; text-shadow: 2px 2px #00000022; }

        .nav-buttons {
            margin: 20px 0;
        }

        .mode-btn {
            font-size: 1.5rem;
            padding: 12px 25px;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 0 #999;
            transition: all 0.1s ease;
        }
        .mode-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #999; }
        #abc-mode-btn { background-color: var(--card-abc); }
        #num-mode-btn { background-color: var(--card-num); }

        #abc-container {
            display: grid;
            grid-template-columns: repeat(13, 1fr); /* 13 letters per row */
            gap: 15px;
        }
        #num-container {
            display: grid;
            grid-template-columns: repeat(11, 1fr); /* 11 numbers in one row */
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px 10px;
            box-shadow: 0 6px 0 #ddd, 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .card:active { transform: scale(0.95); }

        .char {
            font-size: 2.8rem; /* Adjusted for two letters */
            font-weight: bold;
            margin: 0;
        }

        .subtext {
            font-size: 1.2rem;
            color: #555;
            margin-top: 5px;
            display: none;
        }

        /* .reveal class is no longer used for card content */

        .hidden { display: none !important; }

        #details-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 650px;
        }

        #details-display img {
            height: 160px;
            object-fit: contain;
            border-radius: 15px;
        }

        #number-word-text {
            color: #555;
            font-size: 2.2rem;
        }

        .example-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #num-container {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); /* Allow numbers to wrap on small screens */
            }
            #details-display { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎉 Let's Learn! 🎉</h1>
    </header>

    <div class="nav-buttons">
        <button id="abc-mode-btn" class="mode-btn" onclick="switchMode('abc')">🔤 ABCs</button>
        <button id="num-mode-btn" class="mode-btn" onclick="switchMode('num')">🔢 123s</button>
    </div>

    <!-- Active Detail Panel -->
    <div id="details-display" class="hidden">
        <img id="primary-image" src="" alt="Detail view">
        <div class="example-display">
            <p id="number-word-text" class="m-0"></p>
            <img id="example-image" src="" alt="Example visualization">
            <p id="example-text" class="m-0"></p>
        </div>
    </div>

    <main class="container-fluid mb-4">
        <div id="abc-container" class="container"></div>
        <div id="num-container" class="container hidden"></div>
    </main>

    <script>
        const alphabetData = [
            // IMPORTANT: Replace placeholder images with your own files.
            {id: 'A', lower: 'a', word: 'Apple', image: 'images/ex_A.png', color: '#FF3D00'},
            {id: 'B', lower: 'b', word: 'Ball', image: 'images/ex_B.png', color: '#0476D0'},
            {id: 'C', lower: 'c', word: 'Cat', image: 'images/ex_C.png', color: '#FFB300'},
            {id: 'D', lower: 'd', word: 'Dog', image: 'images/ex_D.png', color: '#4CAF50'},
            {id: 'E', lower: 'e', word: 'Elephant', image: 'images/ex_E.png', color: '#9C27B0'},
            {id: 'F', lower: 'f', word: 'Fish', image: 'images/ex_F.png', color: '#00BCD4'},
            {id: 'G', lower: 'g', word: 'Grapes', image: 'images/ex_G.png', color: '#673AB7'},
            {id: 'H', lower: 'h', word: 'Hat', image: 'images/ex_H.png', color: '#795548'},
            {id: 'I', lower: 'i', word: 'Ice Cream', image: 'images/ex_I.png', color: '#E91E63'},
            {id: 'J', lower: 'j', word: 'Juice', image: 'images/ex_J.png', color: '#FF5722'},
            {id: 'K', lower: 'k', word: 'Kite', image: 'images/ex_K.png', color: '#009688'},
            {id: 'L', lower: 'l', word: 'Lion', image: 'images/ex_L.png', color: '#FFC107'},
            {id: 'M', lower: 'm', word: 'Monkey', image: 'images/ex_M.png', color: '#8BC34A'},
            {id: 'N', lower: 'n', word: 'Nest', image: 'images/ex_N.png', color: '#3F51B5'},
            {id: 'O', lower: 'o', word: 'Orange', image: 'images/ex_O.png', color: '#FF9800'},
            {id: 'P', lower: 'p', word: 'Penguin', image: 'images/ex_P.png', color: '#00E676'},
            {id: 'Q', lower: 'q', word: 'Queen', image: 'images/ex_Q.png', color: '#E040FB'},
            {id: 'R', lower: 'r', word: 'Rabbit', image: 'images/ex_R.png', color: '#FF5252'},
            {id: 'S', lower: 's', word: 'Sun', image: 'images/ex_S.png', color: '#FFEA00'},
            {id: 'T', lower: 't', word: 'Train', image: 'images/ex_T.png', color: '#03A9F4'},
            {id: 'U', lower: 'u', word: 'Umbrella', image: 'images/ex_U.png', color: '#9575CD'},
            {id: 'V', lower: 'v', word: 'Violin', image: 'images/ex_V.png', color: '#8D6E63'},
            {id: 'W', lower: 'w', word: 'Watermelon', image: 'images/ex_W.png', color: '#2E7D32'},
            {id: 'X', lower: 'x', word: 'Xylophone', image: 'images/ex_X.png', color: '#006064'},
            {id: 'Y', lower: 'y', word: 'Yo-yo', image: 'images/ex_Y.png', color: '#F50057'},
            {id: 'Z', lower: 'z', word: 'Zebra', image: 'images/ex_Z.png', color: '#212121'}
        ];

        const numberData = [
            {id: '0', word: 'Zero', fingerImg: 'images/f0.png', examples: [
                {text: '🚫 An empty jar has Zero candies', image: 'images/ex0.png'}
               //, {text: '🍪 Zero Cookies', image: 'images/ex0_1.png'},
              //  {text: '🥚 Zero Eggs', image: 'images/ex0_2.png'}
            ], color: '#607D8B'},
            {id: '1', word: 'One', fingerImg: 'images/f1.png', examples: [{text: '☀️ There is One happy sun', image: 'images/ex1.png'}], color: '#FF5722'},
            {id: '2', word: 'Two', fingerImg: 'images/f2.png', examples: [{text: '👀 We have Two eyes', image: 'images/ex2.png'}], color: '#2196F3'},
            {id: '3', word: 'Three', fingerImg: 'images/f3.png', examples: [{text: '🚦 A traffic light has Three lights', image: 'images/ex3.png'}], color: '#4CAF50'},
            {id: '4', word: 'Four', fingerImg: 'images/f4.png', examples: [{text: '🚗 A car has Four wheels', image: 'images/ex4.png'}], color: '#FF9800'},
            {id: '5', word: 'Five', fingerImg: 'images/f5.png', examples: [{text: '🖐️ A hand has Five fingers', image: 'images/ex5.png'}], color: '#9C27B0'},
            {id: '6', word: 'Six', fingerImg: 'images/f6.png', examples: [{text: '🐞 A ladybug has Six legs', image: 'images/ex6.png'}], color: '#E91E63'},
            {id: '7', word: 'Seven', fingerImg: 'images/f7.png', examples: [{text: '🌈 A rainbow has Seven colors', image: 'images/ex7.png'}], color: '#FFEB3B'},
            {id: '8', word: 'Eight', fingerImg: 'images/f8.png', examples: [{text: '🐙 An octopus has Eight tentacles', image: 'images/ex8.png'}], color: '#00BCD4'},
            {id: '9', word: 'Nine', fingerImg: 'images/f9.png', examples: [{text: '🧩 A Rubik\'s cube face has Nine squares', image: 'images/ex9.png'}], color: '#8BC34A'},
            {id: '10', word: 'Ten', fingerImg: 'images/f10.png', examples: [{text: '👐 We have Ten fingers', image: 'images/ex10.png'}], color: '#795548'}
        ];

        const detailsDisplay = document.getElementById('details-display');
        const primaryImage = document.getElementById('primary-image');
        const exampleImage = document.getElementById('example-image');
        const exampleText = document.getElementById('example-text');
        const numberWordText = document.getElementById('number-word-text');

        function createGrid(data, containerId, isNumbers = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderTop = `8px solid ${item.color}`;
                card.dataset.exampleIndex = 0; 
                
                const charEl = document.createElement('p');
                charEl.className = 'char';
                charEl.style.color = item.color;
                if (isNumbers) {
                    charEl.innerText = item.id;
                } else {
                    charEl.innerText = item.id + item.lower;
                }

                card.appendChild(charEl);

                card.addEventListener('click', () => {
                    let textToSpeak = '';
                    if (isNumbers) {
                        detailsDisplay.classList.remove('hidden');
                        document.querySelector('.example-display').classList.remove('hidden');

                        const exampleIndex = parseInt(card.dataset.exampleIndex);
                        const currentExample = item.examples[exampleIndex];

                        primaryImage.src = item.fingerImg;
                        exampleImage.src = currentExample.image;
                        numberWordText.innerText = item.word;
                        exampleText.innerText = currentExample.text;

                        // Remove the emoji from the start of the text for cleaner audio
                        const textForSpeech = currentExample.text.replace(/^(\p{Emoji}|\p{Punctuation})\s*/u, '');
                        textToSpeak = `${item.id}... ${textForSpeech}`;
                        card.dataset.exampleIndex = (exampleIndex + 1) % item.examples.length;
                    } else {
                        detailsDisplay.classList.remove('hidden');
                        document.querySelector('.example-display').classList.add('hidden'); // Hide the smaller example view
                        numberWordText.innerText = ''; // Clear number word for alphabet

                        primaryImage.src = item.image;
                        // The text can be shown in the main area if desired, or just spoken
                        // exampleText.innerText = `${item.id} is for ${item.word}`;

                        textToSpeak = `${item.id}... for ${item.word}`;
                    }

                    speakText(textToSpeak);
                });

                container.appendChild(card);
            });
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.85; 
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function switchMode(mode) {
            if(mode === 'abc') {
                document.getElementById('abc-container').classList.remove('hidden');
                document.getElementById('num-container').classList.add('hidden');
                detailsDisplay.classList.add('hidden'); 
            } else {
                document.getElementById('abc-container').classList.add('hidden');
                document.getElementById('num-container').classList.remove('hidden');
            }
        }

        createGrid(alphabetData, 'abc-container', false);
        createGrid(numberData, 'num-container', true);
    </script>
</body>
</html>
