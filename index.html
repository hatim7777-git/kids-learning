<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Learning for Kids!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --primary-bg: #FFEB3B;
            --card-abc: #FF5722;
            --card-num: #4CAF50;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F0F8FF;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            background-color: #FF9800;
            padding: 15px;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.5rem; text-shadow: 2px 2px #00000022; }

        .nav-buttons {
            margin: 20px 0;
        }

        .mode-btn {
            font-size: 1.5rem;
            padding: 12px 25px;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 0 #999;
            transition: all 0.1s ease;
        }
        .mode-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #999; }
        #abc-mode-btn { background-color: var(--card-abc); }
        #num-mode-btn { background-color: var(--card-num); }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px 10px;
            box-shadow: 0 6px 0 #ddd, 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .card:active {
            transform: scale(0.95);
        }

        .char {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
        }

        .subtext {
            font-size: 1.2rem;
            color: #555;
            margin-top: 5px;
            display: none;
        }

        .card.reveal .subtext { display: block; }
        .card.reveal .char { font-size: 2.5rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>🎉 Let's Learn! 🎉</h1>
    </header>

    <div class="nav-buttons">
        <button id="abc-mode-btn" class="mode-btn" onclick="switchMode('abc')">🔤 ABCs</button>
        <button id="num-mode-btn" class="mode-btn" onclick="switchMode('num')">🔢 123s</button>
    </div>

    <main class="container-fluid">
        <div id="abc-container" class="container"></div>
        <div id="num-container" class="container hidden"></div>
    </main>

    <script>
        // Note: Bootstrap JS is not included as it's not required for the current functionality.
        const alphabetData = [
            {id: 'A', word: 'Apple', emoji: '🍎', color: '#FF3D00'},
            {id: 'B', word: 'Ball', emoji: '⚽', color: '#0476D0'},
            {id: 'C', word: 'Cat', emoji: '🐱', color: '#FFB300'},
            {id: 'D', word: 'Dog', emoji: '🐶', color: '#4CAF50'},
            {id: 'E', word: 'Elephant', emoji: '🐘', color: '#9C27B0'},
            {id: 'F', word: 'Fish', emoji: '🐟', color: '#00BCD4'},
            {id: 'G', word: 'Grapes', emoji: '🍇', color: '#673AB7'},
            {id: 'H', word: 'Hat', emoji: '🎩', color: '#795548'},
            {id: 'I', word: 'Ice Cream', emoji: '🍦', color: '#E91E63'},
            {id: 'J', word: 'Juice', emoji: '🧃', color: '#FF5722'},
            {id: 'K', word: 'Kite', emoji: '🪁', color: '#009688'},
            {id: 'L', word: 'Lion', emoji: '🦁', color: '#FFC107'},
            {id: 'M', word: 'Monkey', emoji: '🐒', color: '#8BC34A'},
            {id: 'N', word: 'Nest', emoji: '🪹', color: '#3F51B5'},
            {id: 'O', word: 'Orange', emoji: '🍊', color: '#FF9800'},
            {id: 'P', word: 'Penguin', emoji: '🐧', color: '#00E676'},
            {id: 'Q', word: 'Queen', emoji: '👸', color: '#E040FB'},
            {id: 'R', word: 'Rabbit', emoji: '🐇', color: '#FF5252'},
            {id: 'S', word: 'Sun', emoji: '☀️', color: '#FFEA00'},
            {id: 'T', word: 'Train', emoji: '🚂', color: '#03A9F4'},
            {id: 'U', word: 'Umbrella', emoji: '☂️', color: '#9575CD'},
            {id: 'V', word: 'Violin', emoji: '🎻', color: '#8D6E63'},
            {id: 'W', word: 'Watermelon', emoji: '🍉', color: '#2E7D32'},
            {id: 'X', word: 'Xylophone', emoji: '🪵', color: '#006064'},
            {id: 'Y', word: 'Yo-yo', emoji: '🪀', color: '#F50057'},
            {id: 'Z', word: 'Zebra', emoji: '🦓', color: '#212121'}
        ];

        const numberData = [
            {id: '1', word: 'One Sun', emoji: '☀️', color: '#FF5722'},
            {id: '2', word: 'Two Eyes', emoji: '👀', color: '#2196F3'},
            {id: '3', word: 'Three Birds', emoji: '🦜', color: '#4CAF50'},
            {id: '4', word: 'Four Cars', emoji: '🚗', color: '#FF9800'},
            {id: '5', word: 'Five Balloons', emoji: '🎈', color: '#9C27B0'},
            {id: '6', word: 'Six Cakes', emoji: '🍰', color: '#E91E63'},
            {id: '7', word: 'Seven Stars', emoji: '⭐', color: '#FFEB3B'},
            {id: '8', word: 'Eight Fish', emoji: '🐟', color: '#00BCD4'},
            {id: '9', word: 'Nine Flowers', emoji: '💐', color: '#8BC34A'},
            {id: '10', word: 'Ten Pennies', emoji: '🪙', color: '#795548'}
        ];

        function createGrid(data, containerId, isNumbers = false) {
            const container = document.getElementById(containerId);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderTop = `8px solid ${item.color}`;
                
                const charEl = document.createElement('p');
                charEl.className = 'char';
                charEl.style.color = item.color;
                charEl.innerText = item.id;

                const subEl = document.createElement('p');
                subEl.className = 'subtext';
                subEl.innerText = `${item.emoji} ${item.word}`;

                card.appendChild(charEl);
                card.appendChild(subEl);

                // Touch/Click Event
                card.addEventListener('click', () => {
                    // Reset all other cards in this container
                    container.querySelectorAll('.card').forEach(c => {
                        if(c !== card) c.classList.remove('reveal');
                    });
                    
                    // Toggle current card
                    card.classList.toggle('reveal');
                    
                    // Voice Synth Speak
                    speakText(isNumbers ? `${item.id}... ${item.word}` : `${item.id}... for ${item.word}`);
                });

                container.appendChild(card);
            });
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current speech
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9; // Slightly slower for kids
                utterance.pitch = 1.2; // Cheerful pitch
                window.speechSynthesis.speak(utterance);
            }
        }

        function switchMode(mode) {
            if(mode === 'abc') {
                document.getElementById('abc-container').classList.remove('hidden');
                document.getElementById('num-container').classList.add('hidden');
            } else {
                document.getElementById('abc-container').classList.add('hidden');
                document.getElementById('num-container').classList.remove('hidden');
            }
        }

        // Initialize
        createGrid(alphabetData, 'abc-container', false);
        createGrid(numberData, 'num-container', true);
    </script>
</body>
</html>
